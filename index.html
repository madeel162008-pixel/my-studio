<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AM STUDIO | Pro Dashboard</title>
    <!-- Font Awesome 6 (free) for watch, bracelet, headphones icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* ---------- PRELOADER ANIMATION (watches, bracelets, headphones rotate & form logo) ---------- */
        #preloader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }

        .animation-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .orbit-icon {
            position: absolute;
            font-size: 48px;
            color: #d4af37;
            filter: drop-shadow(0 0 6px rgba(212, 175, 55, 0.6));
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            will-change: transform;
        }

        /* central logo (hidden at first, appears after merging) */
        .central-logo {
            width: 110px;
            height: auto;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.5s ease-out;
            border-radius: 50%;
            background: #000;
            padding: 5px;
        }

        .logo-reveal {
            opacity: 1 !important;
            transform: scale(1) !important;
            transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2) 0.1s !important;
        }

        /* main content initially hidden until preloader finishes */
        #mainContent {
            display: none;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        /* navbar, header etc */
        .navbar {
            background: #111;
            padding: 15px;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
        }

        .navbar a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
        }

        .header {
            border-bottom: 2px solid #d4af37;
            padding: 30px 20px;
            margin-bottom: 30px;
            text-align: center;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 10px;
            cursor: default;
            display: inline-block;
        }

        #discount-bar {
            background: #d4af37;
            color: #000;
            padding: 10px;
            font-weight: bold;
            display: block;
            font-size: 14px;
            text-align: center;
        }

        .category-container {
            margin-bottom: 40px;
            padding: 0 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .cat-box {
            border: 1px solid #333;
            padding: 15px;
            width: 150px;
            background: #111;
            border-radius: 5px;
            font-size: 12px;
            letter-spacing: 1px;
            color: #d4af37;
            text-align: center;
        }

        /* ---------- PRODUCT GRID : 2 COLUMNS ---------- */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px 20px;
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px 25px;
        }

        .product-card {
            border: 2px solid #d4af37;
            background: #0a0a0a;
            border-radius: 12px;
            padding: 20px 15px;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 20px rgba(212, 175, 55, 0.2);
            border-color: #e5c559;
        }

        .img {
            width: 100%;
            max-width: 280px;
            height: auto;
            border-radius: 8px;
            border: 1px solid #444;
            object-fit: cover;
            margin: 12px 0;
        }

        .btn {
            background: #d4af37;
            color: #000;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #f5cb42;
            transform: scale(0.98);
        }

        /* search bar styling */
        .search-section {
            max-width: 700px;
            margin: 20px auto 10px auto;
            padding: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px;
            background: #111;
            border: 1.5px solid #d4af37;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
        }

        .search-box:focus {
            border-color: #f5cb42;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .search-box::placeholder {
            color: #aaa;
            letter-spacing: 0.5px;
        }

        .footer-section {
            background: #111;
            padding: 40px 20px;
            border-top: 1px solid #333;
            text-align: center;
            margin-top: 40px;
        }

        /* responsive: on smaller screens 1 column */
        @media (max-width: 700px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
        }

        .no-products {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #aaa;
            grid-column: span 2;
        }

        @media (max-width: 700px) {
            .no-products {
                grid-column: span 1;
            }
        }

        /* ---------- EMAIL MODAL STYLES ---------- */
        .email-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(8px);
            z-index: 30000;
            align-items: center;
            justify-content: center;
            font-family: 'Arial', sans-serif;
        }
        .email-modal-content {
            background: #0c0c0c;
            border: 2px solid #d4af37;
            border-radius: 28px;
            padding: 35px 28px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 35px rgba(0,0,0,0.6), 0 0 15px rgba(212,175,55,0.3);
            animation: fadeSlideUp 0.4s ease-out;
        }
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .email-modal h3 {
            font-size: 26px;
            color: #d4af37;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .email-modal p {
            font-size: 14px;
            color: #cccccc;
            margin-bottom: 25px;
        }
        .email-modal input {
            width: 100%;
            padding: 14px 18px;
            background: #1e1e1e;
            border: 1px solid #d4af37;
            border-radius: 50px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            transition: 0.2s;
        }
        .email-modal input:focus {
            border-color: #f5cb42;
            box-shadow: 0 0 8px rgba(212,175,55,0.6);
        }
        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal-btn {
            padding: 12px 0;
            font-weight: bold;
            border-radius: 50px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            font-family: inherit;
        }
        .btn-login {
            background: #d4af37;
            color: #000;
            border: 1px solid #d4af37;
        }
        .btn-login:hover {
            background: #f5cb42;
            transform: scale(0.98);
        }
        .btn-guest {
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
        }
        .btn-guest:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #f5cb42;
        }
        .error-msg {
            color: #ff8c6e;
            font-size: 12px;
            margin-top: -18px;
            margin-bottom: 12px;
            display: block;
        }
    </style>
</head>
<body>

    <!-- PRELOADER ANIMATION -->
    <div id="preloader">
        <div class="animation-container" id="animContainer">
            <i class="orbit-icon fas fa-clock" id="watchIcon"></i>
            <i class="orbit-icon fas fa-gem" id="braceletIcon"></i>
            <i class="orbit-icon fas fa-headphones" id="headphoneIcon"></i>
            <img src="https://i.postimg.cc/hGvvPXwS/ei-1771101710052-removebg-preview.png" alt="AM STUDIO LOGO" class="central-logo" id="centralLogoAnim">
        </div>
    </div>

    <!-- MAIN WEBSITE CONTENT -->
    <div id="mainContent">
        <div id="discount-bar">PREMIUM LIFESTYLE PRODUCTS - AM STUDIO</div>

        <div class="navbar">
            <a href="#products">Products</a>
            <a href="https://wa.me/923172722004">Contact</a>
        </div>

        <div class="header">
            <img src="https://i.postimg.cc/hGvvPXwS/ei-1771101710052-removebg-preview.png" alt="Logo" class="logo">
            <p style="color:#d4af37; letter-spacing: 2px; margin-top: 10px; font-size: 14px;">QUALITY MEETS LIFESTYLE</p>
        </div>

        <div class="category-container">
            <div class="cat-box">HOME DECOR</div>
            <div class="cat-box">FASHION</div>
            <div class="cat-box">SMART TECH</div>
        </div>

        <!-- SEARCH BAR -->
        <div class="search-section">
            <input type="text" id="searchInput" class="search-box" placeholder="🔍 Search products by name... (e.g., watch, bracelet)" autocomplete="off">
        </div>

        <div id="products">
            <div id="dynamic-products" class="products-grid">Loading products from AM STUDIO...</div>
        </div>

        <div class="footer-section">
            <h3>ABOUT AM STUDIO</h3>
            <p style="color: #aaa; font-size: 14px;">© 2026 AM STUDIO | KARACHI, PAKISTAN</p>
        </div>
    </div>

    <!-- EMAIL MODAL (appears once for new visitors) -->
    <div id="emailModal" class="email-modal">
        <div class="email-modal-content">
            <h3>✦ AM STUDIO ✦</h3>
            <p>Enter your email to unlock exclusive updates & premium access</p>
            <input type="email" id="visitorEmail" placeholder="Your email address" autocomplete="email">
            <div id="emailError" class="error-msg"></div>
            <div class="modal-buttons">
                <button class="modal-btn btn-login" id="modalLoginBtn">LOGIN</button>
                <button class="modal-btn btn-guest" id="modalGuestBtn">CONTINUE SHOPPING (NO LOGIN)</button>
            </div>
        </div>
    </div>

    <script>
        // ======================= NO ADMIN DASHBOARD - PURE PRODUCT DISPLAY =======================
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxELEbzbD6f7kMW4bXPNnZeOrEAVDgqRnZ9OUJbERuBqa7bZaQhwCxVnuDcMJJU_XcnIA/exec'; 
        let globalData = [];
        let currentSearchTerm = "";

        // Preloader elements
        const preloader = document.getElementById('preloader');
        const mainContent = document.getElementById('mainContent');
        const watchIcon = document.getElementById('watchIcon');
        const braceletIcon = document.getElementById('braceletIcon');
        const headphoneIcon = document.getElementById('headphoneIcon');
        const centralLogoAnim = document.getElementById('centralLogoAnim');

        // ---------- PRELOADER ANIMATION (rotate & merge) ----------
        function startOrbitAnimation() {
            const radius = 115;
            let angle = 0;
            // set initial positions
            const icons = [watchIcon, braceletIcon, headphoneIcon];
            icons.forEach(icon => {
                if (icon) icon.style.position = 'absolute';
            });
            const orbitInterval = setInterval(() => {
                if (!preloader || preloader.style.display === 'none') {
                    clearInterval(orbitInterval);
                    return;
                }
                angle = (angle + 8) % 360;
                const anglesPos = [0, 120, 240];
                icons.forEach((icon, idx) => {
                    let finalAngle = anglesPos[idx] + angle;
                    let radian = finalAngle * Math.PI / 180;
                    let x = Math.cos(radian) * radius;
                    let y = Math.sin(radian) * radius;
                    icon.style.transform = `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;
                });
            }, 45);
            
            setTimeout(() => {
                clearInterval(orbitInterval);
                icons.forEach(icon => {
                    icon.style.transition = "all 0.55s cubic-bezier(0.2, 0.9, 0.3, 1.2)";
                    icon.style.transform = "translate(-50%, -50%) scale(0.1)";
                    icon.style.opacity = "0";
                });
                centralLogoAnim.classList.add('logo-reveal');
                setTimeout(() => {
                    preloader.style.opacity = "0";
                    setTimeout(() => {
                        preloader.style.display = "none";
                        mainContent.style.display = "block";
                        setTimeout(() => {
                            mainContent.style.opacity = "1";
                            showEmailModalIfNewUser();
                        }, 30);
                    }, 500);
                }, 550);
            }, 1800);
        }

        // ---------- EMAIL MODAL LOGIC (no admin, just stores email) ----------
        const emailModal = document.getElementById('emailModal');
        const visitorEmailInput = document.getElementById('visitorEmail');
        const emailErrorSpan = document.getElementById('emailError');
        
        function isEmailDecisionMade() {
            return localStorage.getItem('am_email_decision') === 'true';
        }
        
        function showEmailModalIfNewUser() {
            if (isEmailDecisionMade()) return;
            if (!emailModal) return;
            document.body.style.overflow = 'hidden';
            emailModal.style.display = 'flex';
        }
        
        function hideEmailModal() {
            emailModal.style.display = 'none';
            document.body.style.overflow = '';
        }
        
        function validateEmail(email) {
            const re = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }
        
        function handleEmailDecision(action) {
            const email = visitorEmailInput.value.trim();
            if (!email || !validateEmail(email)) {
                emailErrorSpan.innerText = "⚠️ Please enter a valid email address.";
                return false;
            }
            emailErrorSpan.innerText = "";
            localStorage.setItem('am_user_email', email);
            localStorage.setItem('am_email_decision', 'true');
            
            if (action === 'login') {
                console.log(`🔐 LOGIN MODE | Email: ${email} | Welcome back!`);
                // Optional: you could add a small welcome toast, but no admin panel.
            } else {
                console.log(`🛒 GUEST MODE | Email: ${email} | Continue as guest.`);
            }
            hideEmailModal();
            return true;
        }
        
        function bindModalEvents() {
            const loginBtn = document.getElementById('modalLoginBtn');
            const guestBtn = document.getElementById('modalGuestBtn');
            if (loginBtn) loginBtn.addEventListener('click', () => handleEmailDecision('login'));
            if (guestBtn) guestBtn.addEventListener('click', () => handleEmailDecision('guest'));
        }
        
        // ---------- PRODUCT DISPLAY (no edit buttons, all products Public) ----------
        function refreshProductDisplay() {
            const container = document.getElementById('dynamic-products');
            if (!globalData.length) {
                if (container) container.innerHTML = '<div class="no-products">✨ No products loaded yet. Check back soon.</div>';
                return;
            }
            
            const searchTerm = currentSearchTerm.toLowerCase().trim();
            const filteredItems = globalData.filter(item => {
                // Show only Public products (no hidden items at all)
                if (item.Status !== 'Public') return false;
                if (searchTerm !== "" && !item.ProductName.toLowerCase().includes(searchTerm)) return false;
                return true;
            });
            
            if (!container) return;
            if (filteredItems.length === 0) {
                container.innerHTML = '<div class="no-products">🔎 No matching products found. Try another keyword.</div>';
                return;
            }
            
            let html = '';
            filteredItems.forEach(item => {
                html += `
                    <div class="product-card">
                        <h2 style="color: #d4af37; font-size: 1.4rem;">${escapeHtml(item.ProductName)}</h2>
                        <img src="${item.ImageURL}" class="img" onerror="this.src='https://i.postimg.cc/RWtzJxKz/IMG-20260116-WA0014.jpg'">
                        <p style="font-weight:bold; font-size:1.2rem;">PKR ${item.Price}</p>
                        <a href="${item.ProductLink || '#'}" target="_blank" class="btn">ORDER NOW</a>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        async function loadData() {
            try {
                const response = await fetch(scriptURL);
                const allData = await response.json();
                globalData = allData;
                refreshProductDisplay();
            } catch (error) {
                const container = document.getElementById('dynamic-products');
                if (container) container.innerHTML = '<div class="no-products">⚠️ Failed to load products. Please check your connection.</div>';
                console.error(error);
            }
        }
        
        function initSearch() {
            const searchInput = document.getElementById('searchInput');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    currentSearchTerm = e.target.value;
                    refreshProductDisplay();
                });
            }
        }
        
        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            initSearch();
            bindModalEvents();
        });
        
        window.addEventListener('load', () => {
            startOrbitAnimation();
            loadData();
        });
    </script>
</body>
</html>
